appId: com.voicetyper.app
productName: VoiceTyper
copyright: Copyright © 2024 VoiceTyper

directories:
  output: release
  buildResources: build

files:
  - electron/**
  - ui/**
  - "!node_modules/**"

extraResources:
  - from: bin/dictee_engine
    to: engine/dictee_engine
  - from: models/
    to: models/
    filter:
      - "**/*"

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VoiceTyper

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icons/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: VoiceTyper
  icon: build/icons/icon.icns
  iconSize: 80
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# ─── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icons/
  category: Utility
  description: Universal voice-to-text — type with your voice anywhere
  artifactName: VoiceTyper-${version}.AppImage
  desktop:
    StartupNotify: true
    Categories: Utility;Accessibility;

deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3
    - xdotool

# ─── Auto-update ──────────────────────────────────────────────────────────────
publish:
  - provider: generic
    url: http://72.60.215.20:8766/releases/
    channel: latest
