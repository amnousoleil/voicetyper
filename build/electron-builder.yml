appId: com.girivoicetyper.app
productName: GiriVoiceTyper
copyright: Copyright 2024 VoiceTyper

directories:
  output: release
  buildResources: build

files:
  - electron/**
  - ui/**
  - "!node_modules/**"

extraResources:
  - from: models/
    to: models/
    filter:
      - "**/*"

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico
  requestedExecutionLevel: asInvoker
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  extraResources:
    - from: bin/dictee_engine.exe
      to: engine/dictee_engine.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GiriVoiceTyper
  runAfterFinish: true

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: build/icons/icon.png
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: bin/dictee_engine
      to: engine/dictee_engine

dmg:
  title: GiriVoiceTyper
  icon: build/icons/icon.png
  iconSize: 80
  background: null
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# ─── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icons/
  category: Utility
  description: Universal voice-to-text — type with your voice anywhere
  artifactName: GiriVoiceTyper-${version}.AppImage
  desktop:
    StartupNotify: true
    Categories: Utility;Accessibility;
  extraResources:
    - from: bin/dictee_engine
      to: engine/dictee_engine

deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3
    - xdotool
    - libportaudio2

# ─── Auto-update ──────────────────────────────────────────────────────────────
publish:
  - provider: generic
    url: http://72.60.215.20:8766/releases/
    channel: latest
