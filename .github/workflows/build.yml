name: Build VoiceTyper

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller aiohttp vosk sounddevice numpy pyperclip segno pynput pywin32 multidict yarl aiosignal frozenlist async-timeout attrs cffi

      - name: Create bin directory
        run: mkdir -p bin
        shell: bash

      - name: Download Vosk model (FR small)
        shell: bash
        run: |
          mkdir -p models
          if [ ! -d "models/vosk-model-small-fr-0.22" ]; then
            echo "Downloading Vosk FR model..."
            curl -L -o /tmp/vosk-fr.zip https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip
            unzip -q /tmp/vosk-fr.zip -d models/
            echo "Model extracted: $(ls models/)"
          else
            echo "Model already present"
          fi

      - name: Build Python sidecar
        shell: bash
        run: |
          cd engine
          python -m PyInstaller --onedir --name dictee_engine \
            --paths . \
            --collect-all vosk \
            --hidden-import vosk \
            --collect-all sounddevice \
            --hidden-import sounddevice \
            --hidden-import _sounddevice_data \
            --hidden-import numpy \
            --hidden-import _cffi_backend \
            --hidden-import pyperclip \
            --hidden-import aiohttp \
            --hidden-import aiohttp.web \
            --hidden-import aiohttp.web_app \
            --hidden-import aiohttp.web_request \
            --hidden-import aiohttp.web_response \
            --hidden-import aiohttp.web_runner \
            --hidden-import aiohttp.web_ws \
            --hidden-import multidict \
            --hidden-import yarl \
            --hidden-import aiosignal \
            --hidden-import frozenlist \
            --hidden-import async_timeout \
            --hidden-import attrs \
            --hidden-import segno \
            --hidden-import pynput \
            --hidden-import pynput.keyboard \
            --hidden-import pynput.keyboard._win32 \
            --hidden-import pynput.mouse \
            --hidden-import win32api \
            --hidden-import win32con \
            --hidden-import win32clipboard \
            --exclude-module torch \
            --exclude-module faster_whisper \
            --exclude-module tensorflow \
            --exclude-module scipy \
            --exclude-module matplotlib \
            --exclude-module pandas \
            --exclude-module tkinter \
            --clean \
            dictee_engine.py
          cp -r dist/dictee_engine ../bin/dictee_engine_dir

      - name: Install Node deps
        run: npm install

      - name: Build Windows exe
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: VoiceTyper-Windows
          path: release/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller aiohttp vosk sounddevice numpy pyperclip segno pynput multidict yarl aiosignal frozenlist async-timeout attrs cffi

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build Python sidecar
        run: |
          cd engine
          python3 -m PyInstaller --onefile --name dictee_engine \
            --paths . \
            --collect-all vosk \
            --hidden-import vosk \
            --collect-all sounddevice \
            --hidden-import sounddevice \
            --hidden-import _sounddevice_data \
            --hidden-import numpy \
            --hidden-import _cffi_backend \
            --hidden-import pyperclip \
            --hidden-import aiohttp \
            --hidden-import aiohttp.web \
            --hidden-import aiohttp.web_app \
            --hidden-import multidict \
            --hidden-import yarl \
            --hidden-import aiosignal \
            --hidden-import frozenlist \
            --hidden-import async_timeout \
            --hidden-import attrs \
            --hidden-import segno \
            --hidden-import pynput \
            --hidden-import pynput.keyboard \
            --hidden-import pynput.keyboard._darwin \
            --exclude-module torch \
            --exclude-module faster_whisper \
            --exclude-module tkinter \
            --clean \
            dictee_engine.py
          cp dist/dictee_engine ../bin/dictee_engine

      - name: Install Node deps
        run: npm install

      - name: Build macOS dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v4
        with:
          name: VoiceTyper-macOS
          path: release/*.dmg
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 xdotool

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller aiohttp vosk sounddevice numpy pyperclip segno pynput multidict yarl aiosignal frozenlist async-timeout attrs cffi

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build Python sidecar
        run: |
          cd engine
          python3 -m PyInstaller --onefile --name dictee_engine \
            --paths . \
            --collect-all vosk \
            --hidden-import vosk \
            --collect-all sounddevice \
            --hidden-import sounddevice \
            --hidden-import _sounddevice_data \
            --hidden-import numpy \
            --hidden-import _cffi_backend \
            --hidden-import pyperclip \
            --hidden-import aiohttp \
            --hidden-import aiohttp.web \
            --hidden-import aiohttp.web_app \
            --hidden-import multidict \
            --hidden-import yarl \
            --hidden-import aiosignal \
            --hidden-import frozenlist \
            --hidden-import async_timeout \
            --hidden-import attrs \
            --hidden-import segno \
            --hidden-import pynput \
            --hidden-import pynput.keyboard \
            --hidden-import pynput.keyboard._xorg \
            --exclude-module torch \
            --exclude-module faster_whisper \
            --exclude-module tkinter \
            --clean \
            dictee_engine.py
          cp dist/dictee_engine ../bin/dictee_engine

      - name: Install Node deps
        run: npm install

      - name: Build Linux AppImage
        run: npm run build:linux

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: VoiceTyper-Linux
          path: release/*.AppImage
          retention-days: 30
